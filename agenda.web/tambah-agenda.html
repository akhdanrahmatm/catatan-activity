<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Agenda</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
<div class="page-wrapper" style="max-width:560px;">

    <a href="index.html" class="back-link">← Kembali ke Dashboard</a>

    <div class="page-header" style="border-bottom:none; margin-bottom:8px;">
        <div class="page-title-wrap">
            <div class="eyebrow">Buat Baru</div>
            <h1>Tambah Agenda</h1>
        </div>
    </div>

    <div class="card" style="margin-top:16px;">
        <form id="formAgenda">

            <div class="form-group">
                <label>Judul Agenda</label>
                <input type="text" id="judul" placeholder="Contoh: Rapat bulanan tim…" required>
            </div>

            <div class="row-group">
                <div class="form-group">
                    <label>Tipe</label>
                    <select id="tipe">
                        <option value="📝 Tugas">📝 Tugas</option>
                        <option value="🤝 Rapat">🤝 Rapat</option>
                        <option value="🎉 Acara">🎉 Acara</option>
                        <option value="📌 Project">📌 Project</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Prioritas</label>
                    <select id="prioritas">
                        <option value="🔴 Tinggi">🔴 Tinggi</option>
                        <option value="🟡 Sedang">🟡 Sedang</option>
                        <option value="🟢 Rendah">🟢 Rendah</option>
                    </select>
                </div>
            </div>

            <div class="row-group">
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="tanggal" required>
                </div>
                <div class="form-group">
                    <label>Jam</label>
                    <input type="time" id="jam" required>
                </div>
            </div>

            <div class="form-group">
                <label>Catatan</label>
                <textarea id="keterangan" placeholder="Tambahkan catatan atau detail agenda…"></textarea>
            </div>

            <input type="hidden" id="status" value="⚪ Belum">

            <button type="submit" class="btn btn-primary" id="btnSubmit" style="width:100%; padding:12px;">
                Simpan Agenda
            </button>

        </form>
    </div>

</div>
<script src="js/api.js"></script>
<script src="js/tambah.js"></script>
</body>
</html>
